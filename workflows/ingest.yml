name: Daily AI Knowledge Ingest

on:
  schedule:
    # Every day at 06:30 UTC (08:30 Madrid winter, 07:30 Madrid summer).
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai-knowledge-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ingest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_ingest.py

      - name: Commit and push new notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add knowledge/
          if git diff --cached --quiet; then
            echo "No new notes to commit."
          else
            git commit -m "Knowledge ingest $(date -u +%Y-%m-%d)"
            git push
          fi
